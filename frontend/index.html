<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Claude Code</title>
  <!-- deploy.sh replaces the whole APP_CONFIG line with the real config JSON -->
  <script>window.APP_CONFIG = {}; /* APP_CONFIG_PLACEHOLDER */</script>
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d1117;
      color: #e0e0e0;
      font-family: -apple-system, 'SF Pro Text', sans-serif;
      overflow: hidden;
    }
    /* Login screen */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      height: 100dvh;
      background: #0d1117;
      padding: 24px;
    }
    #login-screen h1 {
      font-size: 28px;
      font-weight: 700;
      color: #58a6ff;
      margin-bottom: 8px;
    }
    #login-screen p {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .login-form {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .login-form input {
      width: 100%;
      padding: 14px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
    }
    .login-form input:focus { border-color: #58a6ff; }
    .login-form button {
      width: 100%;
      padding: 14px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-form button:active { background: #2ea043; }
    #login-error {
      color: #f85149;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      min-height: 44px;
      gap: 10px;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f0f6fc;
      letter-spacing: 0.5px;
    }
    #header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hdr-btn {
      background: #0f3460;
      color: #a8b2d8;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1;
      padding: 5px 12px;
      cursor: pointer;
    }
    .hdr-btn:active { background: #1a4a8a; }
    .hdr-btn:disabled { opacity: 0.4; cursor: default; }
    #layout-btn { display: none; }
    /* Copy overlay: plain selectable text of the focused terminal's buffer,
       so iOS long-press selection and the Copy callout work normally. */
    #copy-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      background: #0d1117;
      flex-direction: column;
    }
    #copy-overlay.open { display: flex; }
    #copy-overlay-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #16213e;
      color: #a8b2d8;
      font-size: 13px;
      flex-shrink: 0;
    }
    #copy-overlay-text {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0;
      padding: 12px 16px calc(24px + env(safe-area-inset-bottom, 0px));
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      font-size: 13px;
      line-height: 1.4;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-break: break-all;
      -webkit-user-select: text;
      user-select: text;
    }
    #status {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 12px;
      background: #0f3460;
      color: #a8b2d8;
    }
    #status.connected { background: #1a4a1a; color: #4caf50; }
    #status.error { background: #4a1a1a; color: #f44336; }
    #status.warming { background: #3d2e0f; color: #d29922; }
    /* Panes: stacked by default; .side-by-side lays them out in a row */
    #panes {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      position: relative;
      gap: 1px;
      background: #0f3460; /* shows through the gap as a divider line */
    }
    #panes.side-by-side { flex-direction: row; }
    /* Draggable divider between panes; ::before pads the touch hit area */
    .pane-divider {
      flex: 0 0 10px;
      position: relative;
      z-index: 4;
      background: #0f3460;
      touch-action: none;
      cursor: row-resize;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pane-divider::before { content: ''; position: absolute; inset: -8px 0; }
    .pane-divider::after {
      content: '';
      width: 36px; height: 4px;
      border-radius: 2px;
      background: #30518a;
    }
    .pane-divider.dragging::after { background: #58a6ff; }
    #panes.side-by-side .pane-divider { cursor: col-resize; }
    #panes.side-by-side .pane-divider::before { inset: 0 -8px; }
    #panes.side-by-side .pane-divider::after { width: 4px; height: 36px; }
    .pane {
      flex: 1;
      min-width: 0;
      min-height: 0;
      position: relative;
      background: #0d1117;
      padding: 4px;
      border: 1px solid transparent;
    }
    .pane.focused { border-color: #1f3a5f; }
    .pane .term { width: 100%; height: 100%; }
    /* iOS: momentum scrolling on xterm's scroll container */
    .xterm .xterm-viewport { -webkit-overflow-scrolling: touch; }
    /* Touch devices: xterm 5's DOM renderer is real text, but xterm.css sets
       user-select: none. Re-enable it so long-press selection + the native
       Copy callout work. (Selection may drop if output redraws mid-press;
       the ⧉ overlay remains the fallback.) */
    @media (pointer: coarse) {
      .xterm .xterm-rows, .xterm .xterm-rows > div {
        -webkit-user-select: text;
        user-select: text;
      }
    }
    /* Toast: transient confirmation (e.g. "URL copied") */
    #toast {
      position: fixed;
      left: 50%;
      bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      z-index: 40;
      background: #16213e;
      color: #c9d1d9;
      border: 1px solid #30518a;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      max-width: 80vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #toast.show { opacity: 1; pointer-events: auto; }
    .pane-close {
      display: none;
      position: absolute;
      top: 6px;
      right: 10px;
      z-index: 5;
      background: rgba(22, 33, 62, 0.85);
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 15px;
      line-height: 1;
      padding: 10px 14px; /* comfortable touch target (~40px) */
      cursor: pointer;
    }
    .pane-close:active { color: #f85149; border-color: #f85149; }
    #panes.multi .pane-close { display: block; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: absolute;
      inset: 0;
      background: #0d1117;
      gap: 16px;
      color: #a8b2d8;
      z-index: 10;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-banner {
      display: none;
      padding: 12px 16px;
      background: #4a1a1a;
      color: #f44336;
      font-size: 13px;
      text-align: center;
    }
    #reconnect-btn {
      margin-top: 12px;
      padding: 8px 20px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    /* iOS safe area */
    @supports (padding: env(safe-area-inset-bottom)) {
      #app { padding-bottom: env(safe-area-inset-bottom); }
    }
  </style>
</head>
<body>
<!-- Login screen (shown first) -->
<div id="login-screen">
  <h1>Claude Code</h1>
  <p>iPad Sandbox</p>
  <div class="login-form">
    <input type="email" id="login-email" placeholder="Email" autocomplete="email" inputmode="email">
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
    <div id="login-error"></div>
    <button id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- Terminal app (shown after login) -->
<div id="app" style="display:none; height:100%; height:100dvh; flex-direction:column;">
  <div id="header">
    <h1>Claude Code</h1>
    <div id="header-actions">
      <button class="hdr-btn" id="copy-btn" onclick="openCopyOverlay()" title="Select — view terminal text for copying">⧉</button>
      <button class="hdr-btn" id="paste-btn" onclick="pasteClipboard()" title="Paste clipboard into the terminal">⌘V</button>
      <button class="hdr-btn" id="split-btn" onclick="addPane()" title="Split — open another terminal">⊞ Split</button>
      <button class="hdr-btn" id="layout-btn" onclick="toggleLayout()" title="Toggle stacked / side-by-side panes">⬓</button>
      <span id="status">Connecting…</span>
    </div>
  </div>
  <div id="error-banner"></div>
  <div id="panes">
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-msg">Loading terminal…</div>
    </div>
  </div>
  <div id="copy-overlay">
    <div id="copy-overlay-bar">
      <span>Long-press to select · text of the focused terminal</span>
      <button class="hdr-btn" onclick="closeCopyOverlay()">Done</button>
    </div>
    <pre id="copy-overlay-text"></pre>
  </div>
  <div id="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CONFIG = window.APP_CONFIG || {};
const TOKEN_API_URL = CONFIG.tokenApiUrl || '';
const MAX_PANES = 4;
const PANES_STORAGE_KEY = 'ipad-claude-panes';
const LAYOUT_STORAGE_KEY = 'ipad-claude-layout'; // 'stacked' (default) | 'side-by-side'

// ── Cognito auth ──────────────────────────────────────────────────────────────
// amazon-cognito-identity-js persists sessions in localStorage and refreshes
// tokens automatically. We authenticate against the user pool (no self-signup —
// users are admin-created), then send the resulting JWT to the token API, where
// API Gateway's Cognito authorizer validates it before the Lambda runs.
const userPool = (CONFIG.userPoolId && CONFIG.userPoolClientId)
  ? new AmazonCognitoIdentity.CognitoUserPool({
      UserPoolId: CONFIG.userPoolId,
      ClientId: CONFIG.userPoolClientId,
    })
  : null;

let cognitoUser = null;   // current CognitoUser (set after login)

// Return a valid ID-token JWT, refreshing via the stored refresh token if the
// cached session has expired. Rejects if there's no valid session.
function getIdToken() {
  return new Promise((resolve, reject) => {
    const user = cognitoUser || userPool?.getCurrentUser();
    if (!user) return reject(new Error('Not signed in'));
    user.getSession((err, session) => {
      if (err) return reject(err);
      if (!session.isValid()) return reject(new Error('Session expired'));
      cognitoUser = user;
      resolve(session.getIdToken().getJwtToken());
    });
  });
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Enter email and password.'; return; }
  if (!userPool) { errEl.textContent = 'Auth not configured. Re-run the deploy.'; return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  const done = () => { btn.disabled = false; btn.textContent = 'Sign In'; };

  const user = new AmazonCognitoIdentity.CognitoUser({ Username: email, Pool: userPool });
  const authDetails = new AmazonCognitoIdentity.AuthenticationDetails({ Username: email, Password: password });

  user.authenticateUser(authDetails, {
    onSuccess: () => { cognitoUser = user; done(); showApp(); },
    onFailure: (err) => {
      done();
      errEl.textContent = err.code === 'NotAuthorizedException' || err.code === 'UserNotFoundException'
        ? 'Invalid credentials.' : (err.message || 'Sign-in failed.');
    },
    // Admin-created users must set a permanent password on first login.
    newPasswordRequired: () => {
      done();
      const newPw = window.prompt('First sign-in — choose a new password (min 12 chars):');
      if (!newPw) { errEl.textContent = 'A new password is required on first login.'; return; }
      btn.disabled = true; btn.textContent = 'Setting password…';
      user.completeNewPasswordChallenge(newPw, {}, {
        onSuccess: () => { cognitoUser = user; done(); showApp(); },
        onFailure: (e) => { done(); errEl.textContent = e.message || 'Could not set password.'; },
      });
    },
  });
}

function signOut() {
  try { (cognitoUser || userPool?.getCurrentUser())?.signOut(); } catch {}
  cognitoUser = null;
  location.reload();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  start();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('login-password')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Resume an existing Cognito session if one is stored and still valid.
  getIdToken().then(() => showApp()).catch(() => {/* show login */});
});

// ── Shared connection state (token/endpoint are per-VM, shared by all panes) ──
let authToken = null, mvmEndpoint = null;
let vmState = 'running'; // 'running' | 'starting' | 'resuming' — from the token API
let tokenExpiresAt = 0;
let refreshTimer = null;
let tokenInFlight = null; // dedup concurrent fetches from multiple panes

const statusEl = document.getElementById('status');
const loadingEl = document.getElementById('loading');
const loadingMsgEl = document.getElementById('loading-msg');
const panesEl = document.getElementById('panes');
const errorBannerEl = document.getElementById('error-banner');
const splitBtnEl = document.getElementById('split-btn');
const layoutBtnEl = document.getElementById('layout-btn');

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || '';
}

function showError(msg, showReconnect = true) {
  errorBannerEl.style.display = 'block';
  errorBannerEl.innerHTML = msg + (showReconnect
    ? '<br><button id="reconnect-btn" onclick="reconnect()">Reconnect</button>' : '');
}

function clearError() {
  errorBannerEl.style.display = 'none';
}

// ── Token fetch ──────────────────────────────────────────────────────────────
function fetchToken() {
  if (tokenInFlight) return tokenInFlight; // all panes share one request
  tokenInFlight = (async () => {
    // API Gateway's Cognito authorizer expects the JWT in Authorization.
    const jwt = await getIdToken();
    const resp = await fetch(TOKEN_API_URL, { headers: { Authorization: `Bearer ${jwt}` } });
    if (resp.status === 401) { signOut(); throw new Error('Session expired — please sign in again'); }
    if (!resp.ok) throw new Error(`Token API ${resp.status}: ${await resp.text()}`);
    const data = await resp.json();
    authToken = data.authToken;
    mvmEndpoint = data.endpoint;
    vmState = data.vmState || 'running';
    tokenExpiresAt = Date.now() + data.expiresInSeconds * 1000;

    // Schedule refresh 5 min before expiry
    const refreshIn = (data.expiresInSeconds - 300) * 1000;
    if (refreshTimer) clearTimeout(refreshTimer);
    refreshTimer = setTimeout(refreshToken, Math.max(refreshIn, 30000));

    return data;
  })();
  return tokenInFlight.finally(() => { tokenInFlight = null; });
}

async function refreshToken() {
  try {
    await fetchToken();
    // Re-negotiate if the WS is still open — ttyd will continue the session
    // The token is only used at connection setup, so no mid-session disruption needed.
    console.log('Token refreshed, valid for another 55 min');
  } catch (e) {
    console.warn('Token refresh failed:', e);
  }
}

// Valid token available (fetching one if missing/near expiry).
async function ensureToken() {
  if (authToken && Date.now() < tokenExpiresAt - 60000) return;
  await fetchToken();
}

// ── Warm-up status helpers ────────────────────────────────────────────────────
// While the VM is warming up (fresh launch or resume from suspend), connection
// attempts are expected to fail for a while — keep the status calm and retry
// quietly. Red is reserved for unexpected drops of a previously-live session.
const WARMUP_STATUS = { starting: 'Starting VM…', resuming: 'Resuming VM…' };

function isWarmingUp() {
  return vmState === 'starting' || vmState === 'resuming';
}

// ── Panes ─────────────────────────────────────────────────────────────────────
// Each pane is one terminal + one WebSocket to the same VM; the server keys the
// shell session on the `session` id sent in the handshake, so a pane survives
// reloads/reconnects and reattaches to its shell.
const panes = new Map(); // id -> Pane
let focusedPane = null;

class Pane {
  constructor(id) {
    this.id = id;
    this.ws = null;
    this.state = 'connecting'; // 'connecting' | 'connected' | 'disconnected'
    this.reconnectAttempts = 0;
    this.reconnectTimer = null;
    this.pingTimer = null;
    this.lastPong = 0;
    this.closed = false;

    // DOM
    this.el = document.createElement('div');
    this.el.className = 'pane';
    this.termEl = document.createElement('div');
    this.termEl.className = 'term';
    this.closeBtn = document.createElement('button');
    this.closeBtn.className = 'pane-close';
    this.closeBtn.textContent = '✕';
    this.closeBtn.title = 'Close this terminal (ends its shell)';
    this.closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closePane(this.id); });
    this.el.appendChild(this.termEl);
    this.el.appendChild(this.closeBtn);
    panesEl.appendChild(this.el);

    // Terminal
    this.terminal = new Terminal({
      theme: {
        background: '#0d1117',
        foreground: '#c9d1d9',
        cursor: '#58a6ff',
        black: '#484f58', red: '#ff7b72', green: '#3fb950', yellow: '#d29922',
        blue: '#58a6ff', magenta: '#bc8cff', cyan: '#39c5cf', white: '#b1bac4',
        brightBlack: '#6e7681', brightRed: '#ffa198', brightGreen: '#56d364',
        brightYellow: '#e3b341', brightBlue: '#79c0ff', brightMagenta: '#d2a8ff',
        brightCyan: '#56d4dd', brightWhite: '#f0f6fc',
      },
      fontFamily: '"SF Mono", "Fira Code", Menlo, monospace',
      fontSize: 14,
      lineHeight: 1.3,
      scrollback: 5000,
      cursorBlink: true,
      allowTransparency: false,
      macOptionIsMeta: true,
    });
    this.fitAddon = new FitAddon.FitAddon();
    this.terminal.loadAddon(this.fitAddon);
    this.terminal.loadAddon(new WebLinksAddon.WebLinksAddon(activateLink));
    this.terminal.open(this.termEl);
    this.fitAddon.fit();

    // Click/tap anywhere on the pane to focus its terminal. Click only — iOS
    // synthesizes click for genuine taps but not after scroll gestures, so this
    // doesn't steal focus (and pop the keyboard) mid-scroll. A touchend handler
    // with preventDefault here would also suppress the synthetic click that the
    // pane close button relies on.
    this.el.addEventListener('click', () => this.focus());

    // Refit when the pane resizes (window resize, panes added/removed, rotation)
    this.resizeObserver = new ResizeObserver(() => {
      try { this.fitAddon.fit(); } catch {}
    });
    this.resizeObserver.observe(this.el);

    // Input handlers registered once — this.ws always points at the live socket
    this.terminal.onData((data) => {
      if (!this.ws || this.ws.readyState !== 1) return;
      const encoded = new TextEncoder().encode(data);
      const msg = new Uint8Array(1 + encoded.length);
      msg[0] = 0x30;
      msg.set(encoded, 1);
      this.ws.send(msg);
    });
    this.terminal.onResize(() => this.sendResize());
  }

  focus() {
    this.terminal.focus();
    if (focusedPane !== this) {
      focusedPane?.el.classList.remove('focused');
      focusedPane = this;
      this.el.classList.add('focused');
    }
  }

  connect() {
    if (this.closed || !authToken || !mvmEndpoint) return;
    if (this.ws && this.ws.readyState < 2) { this.ws.close(); }

    // Convert https:// to wss://
    const wsUrl = mvmEndpoint.replace(/^https?:\/\//, 'wss://') + '/';

    const protocols = [
      'lambda-microvms',
      `lambda-microvms.authentication.${authToken}`,
      'lambda-microvms.port.8080',
      'tty',  // ttyd subprotocol
    ];

    const ws = new WebSocket(wsUrl, protocols);
    ws.binaryType = 'arraybuffer';
    this.ws = ws;

    ws.onopen = () => {
      clearError();
      // The server replays the session's scrollback on every (re)connect — reset
      // the terminal first so the replay lands on a clean screen instead of
      // stacking below the previous content.
      this.terminal.reset();
      ws.send(JSON.stringify({ AuthToken: '', session: this.id }));
      // Don't declare "Connected" yet: while the VM boots, the ingress proxy can
      // accept the WS handshake before the terminal server is actually serving,
      // then drop it. Treat the connection as live only when data arrives
      // (onmessage) — until then keep the calm warming status.
      this.fitAddon.fit();
      this.sendResize(); // triggers the TUI to repaint at current pane size
      if (focusedPane === this || !focusedPane) this.focus();
      this.startPing();
      updateStatus();
    };

    ws.onmessage = (event) => {
      this.lastPong = Date.now();
      // First data from the terminal server = the session is genuinely live.
      if (this.state !== 'connected' || vmState !== 'running') {
        vmState = 'running';
        this.state = 'connected';
        this.reconnectAttempts = 0;
        updateStatus();
      }
      loadingEl.style.display = 'none';
      // ttyd protocol: first byte is message type
      // 0 = output data, 1 = set window title, 2 = set preferences
      const data = event.data instanceof ArrayBuffer
        ? new Uint8Array(event.data)
        : new TextEncoder().encode(event.data);

      if (data.length === 0) return;
      // ttyd uses ASCII chars: '0'=48 output, '1'=49 title, '2'=50 prefs
      const cmd = String.fromCharCode(data[0]);
      const payload = data.slice(1);

      if (cmd === '0') {
        this.terminal.write(payload);
      } else if (cmd === '1' && this.id === 'main') {
        document.title = new TextDecoder().decode(payload);
      }
      // cmd '2' (preferences) ignored
    };

    ws.onerror = (e) => {
      console.error(`WS error [${this.id}]`, e);
      // Failed attempts while the VM boots are expected — stay calm, onclose
      // will schedule the next quiet retry.
    };

    ws.onclose = () => {
      this.stopPing();
      if (this.closed) return;
      this.state = 'disconnected';
      this.scheduleReconnect();
    };
  }

  // Keepalive ping: a NUL byte every 15s; no traffic for 45s = dead socket.
  startPing() {
    this.stopPing();
    this.lastPong = Date.now();
    this.pingTimer = setInterval(() => {
      if (!this.ws || this.ws.readyState !== 1) { this.stopPing(); return; }
      if (Date.now() - this.lastPong > 45000) {
        console.warn(`Ping timeout [${this.id}] — reconnecting`);
        this.ws.close();
        return;
      }
      try { this.ws.send(new Uint8Array(1)); } catch {}
    }, 15000);
  }

  stopPing() {
    if (this.pingTimer) { clearInterval(this.pingTimer); this.pingTimer = null; }
  }

  scheduleReconnect() {
    if (this.reconnectTimer || this.closed) return; // already scheduled
    let delay;
    if (isWarmingUp()) {
      delay = 3000; // steady poll while booting — no alarming backoff countdown
    } else {
      delay = Math.min(1000 * Math.pow(2, this.reconnectAttempts), 30000);
    }
    this.reconnectAttempts++;
    updateStatus();
    this.reconnectTimer = setTimeout(async () => {
      this.reconnectTimer = null;
      try { await ensureToken(); } catch (e) {
        updateStatus();
        showError(`Failed to get session token: ${e.message}`);
        this.scheduleReconnect();
        return;
      }
      this.connect();
    }, delay);
  }

  reconnectNow() {
    if (this.reconnectTimer) { clearTimeout(this.reconnectTimer); this.reconnectTimer = null; }
    this.reconnectAttempts = 0;
    if (!this.ws || this.ws.readyState > 1) {
      ensureToken().then(() => this.connect()).catch(e => showError(`Failed to get session token: ${e.message}`));
    }
  }

  sendResize() {
    if (!this.ws || this.ws.readyState !== 1) return;
    const { cols, rows } = this.terminal;
    // ttyd resize: binary frame, first byte '1' (0x31) then JSON
    const json = JSON.stringify({ columns: cols, rows });
    const encoded = new TextEncoder().encode(json);
    const msg = new Uint8Array(1 + encoded.length);
    msg[0] = 0x31; // ASCII '1'
    msg.set(encoded, 1);
    this.ws.send(msg);
  }

  // Permanently close this pane: tell the server to kill the shell, then tear down.
  destroy() {
    this.closed = true;
    if (this.reconnectTimer) { clearTimeout(this.reconnectTimer); this.reconnectTimer = null; }
    this.stopPing();
    if (this.ws && this.ws.readyState === 1) {
      try { this.ws.send(new Uint8Array([0x33])); } catch {} // cmd '3' = kill session
      try { this.ws.close(); } catch {}
    }
    this.resizeObserver.disconnect();
    this.terminal.dispose();
    this.el.remove();
    if (focusedPane === this) focusedPane = null;
  }
}

// ── Pane management ───────────────────────────────────────────────────────────
function savedPaneIds() {
  try {
    const ids = JSON.parse(localStorage.getItem(PANES_STORAGE_KEY));
    if (Array.isArray(ids) && ids.length && ids.every(x => typeof x === 'string')) {
      return ids.slice(0, MAX_PANES);
    }
  } catch {}
  return ['main'];
}

function savePaneIds() {
  try { localStorage.setItem(PANES_STORAGE_KEY, JSON.stringify([...panes.keys()])); } catch {}
}

function updatePaneChrome() {
  panesEl.classList.toggle('multi', panes.size > 1);
  splitBtnEl.disabled = panes.size >= MAX_PANES;
  layoutBtnEl.style.display = panes.size > 1 ? 'block' : 'none';
  rebuildDividers();
}

// ── Divider drag: adjust the split ratio between adjacent panes ───────────────
// A divider sits between each pair of pane elements. Dragging converts the two
// neighbors' pixel sizes to flex-grow values (panes are flex: 1 1 0%),
// normalized so each pair sums to 2 — an unrelated pane at grow 1 stays the
// "average" size. Terminals refit via each pane's ResizeObserver.
function rebuildDividers() {
  for (const d of panesEl.querySelectorAll('.pane-divider')) d.remove();
  const els = [...panesEl.querySelectorAll(':scope > .pane')];
  for (let i = 1; i < els.length; i++) {
    const divider = document.createElement('div');
    divider.className = 'pane-divider';
    divider.addEventListener('pointerdown', (e) => startDividerDrag(e, divider));
    divider.addEventListener('dblclick', () => { // reset to even split
      for (const el of panesEl.querySelectorAll(':scope > .pane')) el.style.flexGrow = '';
    });
    panesEl.insertBefore(divider, els[i]);
  }
}

function startDividerDrag(e, divider) {
  const prev = divider.previousElementSibling;
  const next = divider.nextElementSibling;
  if (!prev || !next) return;
  e.preventDefault();
  divider.setPointerCapture(e.pointerId);
  divider.classList.add('dragging');
  const horizontal = panesEl.classList.contains('side-by-side');
  const startPos = horizontal ? e.clientX : e.clientY;
  const prevStart = horizontal ? prev.offsetWidth : prev.offsetHeight;
  const nextStart = horizontal ? next.offsetWidth : next.offsetHeight;
  const total = prevStart + nextStart;
  const MIN = 80; // px — keep both panes usable

  const onMove = (ev) => {
    const delta = (horizontal ? ev.clientX : ev.clientY) - startPos;
    const prevSize = Math.min(Math.max(prevStart + delta, MIN), total - MIN);
    prev.style.flexGrow = (2 * prevSize / total).toFixed(4);
    next.style.flexGrow = (2 * (total - prevSize) / total).toFixed(4);
  };
  const onUp = () => {
    divider.classList.remove('dragging');
    divider.removeEventListener('pointermove', onMove);
    divider.removeEventListener('pointerup', onUp);
    divider.removeEventListener('pointercancel', onUp);
  };
  divider.addEventListener('pointermove', onMove);
  divider.addEventListener('pointerup', onUp);
  divider.addEventListener('pointercancel', onUp);
}

// ── Pane layout (stacked vs side-by-side) ─────────────────────────────────────
function applyLayout(layout) {
  panesEl.classList.toggle('side-by-side', layout === 'side-by-side');
  // ⬓ = stacked, ◨ = side-by-side; the icon shows the CURRENT layout
  layoutBtnEl.textContent = layout === 'side-by-side' ? '◨' : '⬓';
  setTimeout(() => {
    for (const pane of panes.values()) { try { pane.fitAddon.fit(); } catch {} }
  }, 0);
}

function toggleLayout() {
  const next = panesEl.classList.contains('side-by-side') ? 'stacked' : 'side-by-side';
  try { localStorage.setItem(LAYOUT_STORAGE_KEY, next); } catch {}
  applyLayout(next);
}

// ── Toast: transient notice; tap it to run an action (e.g. open copied URL) ──
const toastEl = document.getElementById('toast');
let toastTimer = null;
let toastAction = null;
function showToast(msg, action) {
  toastEl.textContent = msg;
  toastAction = action || null;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.classList.remove('show'); toastAction = null; }, 4000);
}
toastEl.addEventListener('click', () => {
  toastEl.classList.remove('show');
  const act = toastAction; toastAction = null;
  act?.();
});

// Tapping a URL in the terminal copies it; the toast offers "open" as the
// follow-up. (Straight-to-open is hostile on touch, and clipboard writes
// must happen inside the tap gesture anyway.)
function activateLink(event, uri) {
  navigator.clipboard.writeText(uri)
    .then(() => showToast(`Copied — tap to open: ${uri}`, () => window.open(uri, '_blank')))
    .catch(() => { window.open(uri, '_blank'); }); // clipboard blocked: old behavior
}

// ── Copy / paste (iOS has no terminal selection or Cmd+V) ─────────────────────
// Copy: xterm renders to canvas, so iOS long-press selection can't touch it.
// The ⧉ button mirrors the focused terminal's buffer into a plain <pre>,
// where native selection and the Copy callout work.
const copyOverlayEl = document.getElementById('copy-overlay');
const copyOverlayTextEl = document.getElementById('copy-overlay-text');

function openCopyOverlay() {
  const pane = focusedPane || panes.values().next().value;
  if (!pane) return;
  const buf = pane.terminal.buffer.active;
  const lines = [];
  for (let i = 0; i < buf.length; i++) {
    lines.push(buf.getLine(i)?.translateToString(true) ?? '');
  }
  // Drop the trailing run of blank lines below the prompt
  while (lines.length && lines[lines.length - 1] === '') lines.pop();
  copyOverlayTextEl.textContent = lines.join('\n');
  copyOverlayEl.classList.add('open');
  copyOverlayTextEl.scrollTop = copyOverlayTextEl.scrollHeight;
}

function closeCopyOverlay() {
  copyOverlayEl.classList.remove('open');
  copyOverlayTextEl.textContent = '';
  focusedPane?.focus();
}

async function pasteClipboard() {
  const pane = focusedPane || panes.values().next().value;
  if (!pane) return;
  try {
    const text = await navigator.clipboard.readText(); // iOS shows a Paste prompt
    if (text) pane.terminal.paste(text); // goes through onData with bracketed paste
  } catch {
    showError('Clipboard unavailable — allow paste access when prompted, or long-press the terminal and use the Paste callout.', false);
  }
  pane.focus();
}

function createPane(id) {
  const pane = new Pane(id);
  panes.set(id, pane);
  updatePaneChrome();
  return pane;
}

function addPane() {
  if (panes.size >= MAX_PANES) return;
  // Stable-ish id: reuse the lowest free t<N> so a reload reattaches sanely.
  let id = null;
  for (let n = 2; n <= MAX_PANES + 1; n++) {
    if (!panes.has(`t${n}`)) { id = `t${n}`; break; }
  }
  const pane = createPane(id);
  savePaneIds();
  ensureToken()
    .then(() => { pane.connect(); })
    .catch(e => showError(`Failed to get session token: ${e.message}`));
  pane.focus();
}

function closePane(id) {
  const pane = panes.get(id);
  if (!pane || panes.size <= 1) return;
  if (!confirm('Close this terminal? Its shell (and anything running in it) will end.')) return;
  panes.delete(id);
  pane.destroy();
  savePaneIds();
  updatePaneChrome();
  updateStatus();
  // Give remaining panes their new size, and focus one
  const first = panes.values().next().value;
  first?.focus();
}

// ── Aggregate status ──────────────────────────────────────────────────────────
function updateStatus() {
  if (isWarmingUp()) {
    setStatus(WARMUP_STATUS[vmState], 'warming');
    loadingMsgEl.textContent = WARMUP_STATUS[vmState];
    return;
  }
  const states = [...panes.values()].map(p => p.state);
  if (states.length && states.every(s => s === 'connected')) {
    setStatus('Connected', 'connected');
  } else if (states.some(s => s === 'connected')) {
    setStatus('Reconnecting…', 'error'); // some pane dropped
  } else if (states.some(s => s === 'disconnected')) {
    setStatus('Disconnected', 'error');
  } else {
    setStatus('Connecting…');
  }
}

// ── Visibility-change: reconnect immediately when tab comes back ──────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  for (const pane of panes.values()) {
    pane.lastPong = Date.now(); // suppress false ping-timeout on wake
    if (!pane.ws || pane.ws.readyState > 1) pane.reconnectNow();
  }
});

window.addEventListener('orientationchange', () => setTimeout(() => {
  for (const pane of panes.values()) { try { pane.fitAddon.fit(); } catch {} }
}, 300));

// ── Main ─────────────────────────────────────────────────────────────────────
async function start() {
  clearError();
  setStatus(isWarmingUp() ? WARMUP_STATUS[vmState] : 'Connecting…', isWarmingUp() ? 'warming' : '');
  loadingMsgEl.textContent = 'Connecting to MicroVM…';
  loadingEl.style.display = 'flex';

  try {
    await fetchToken();
  } catch (e) {
    setStatus('Error', 'error');
    showError(`Failed to get session token: ${e.message}`);
    return;
  }

  // Token fetch may have just triggered a launch/resume — reflect it right away
  if (isWarmingUp()) {
    setStatus(WARMUP_STATUS[vmState], 'warming');
    loadingMsgEl.textContent = WARMUP_STATUS[vmState];
  }

  // Restore the saved pane layout (server-side sessions reattach by id)
  if (panes.size === 0) {
    for (const id of savedPaneIds()) createPane(id);
  }
  try { applyLayout(localStorage.getItem(LAYOUT_STORAGE_KEY) || 'stacked'); } catch {}
  for (const pane of panes.values()) pane.connect();
  panes.get('main')?.focus();
}

function reconnect() {
  clearError();
  for (const pane of panes.values()) pane.reconnectNow();
}

// Start is driven by DOMContentLoaded → auto-login or manual login, not here directly
if (!TOKEN_API_URL) {
  document.addEventListener('DOMContentLoaded', () =>
    showError('TOKEN_API_URL not configured. Re-run the deploy script.', false)
  );
}
</script>
</body>
</html>
